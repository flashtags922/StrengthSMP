name: Build StrengthSMP

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verify files (DEBUG STEP)
        run: ls -R

      - name: Build with Maven
        run: mvn -f pom.xml clean package -U
